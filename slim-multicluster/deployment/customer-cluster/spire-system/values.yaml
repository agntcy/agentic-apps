global:
  spire:
    clusterName: ""
    trustDomain: ""
    upstreamSpireAddress: ""

slim-spire:
  spire:
     deploy: true

  # Required only for MicroK8s
  # spiffe-csi-driver:
  #   enabled: true
  #   kubeletPath: /var/snap/microk8s/common/var/lib/kubelet

  # upstream-spiffe-csi-driver:
  #   kubeletPath: /var/snap/microk8s/common/var/lib/kubelet
  #   validatingAdmissionPolicy:
  #     enabled: false

  spiffe-oidc-discovery-provider:
    enabled: false

  spire-server:
    extraEnv:
      - name: HTTP_PROXY
        value: ""
      - name: HTTPS_PROXY
        value: ""
      - name: http_proxy
        value: ""
      - name: https_proxy
        value: ""
      - name: NO_PROXY
        value: ""
      - name: no_proxy
        value: ""

  upstream-spire-agent:
    joinToken:
      enabled: true
      value: "" # value is generated by spire-server and needs to be passed here

    extraEnvVars:
      - name: HTTP_PROXY
        value: ""
      - name: HTTPS_PROXY
        value: ""
      - name: http_proxy
        value: ""
      - name: https_proxy
        value: ""
      - name: NO_PROXY
        value: ""
      - name: no_proxy
        value: ""