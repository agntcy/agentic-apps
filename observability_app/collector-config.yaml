# OpenTelemetry Collector Configuration for SLIM Demo
# Receives metrics from SLIM channel and exports to Prometheus

receivers:
  slim:
    connection-config:
      address: "${env:SLIM_ADDRESS:-http://127.0.0.1:46357}"
    receiver-name: "agntcy/telemetry/collector"
    shared-secret: "7k9mP2nQ8xL4vR6wT3yU5zH1jN0bG8cF9dS2aE"

processors:
  batch:
    timeout: 100ms
    send_batch_size: 100

exporters:
  # Export metrics in Prometheus format
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "slim_demo"
    send_timestamps: true
    metric_expiration: 5m
    resource_to_telemetry_conversion:
      enabled: true

service:
  telemetry:
    logs:
      level: info
    metrics:
      level: none

  pipelines:
    metrics:
      receivers: [slim]
      processors: [batch]
      exporters: [prometheus]
